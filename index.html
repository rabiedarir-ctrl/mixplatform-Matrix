<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ميكس</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Theme Color -->
    <meta name="theme-color" content="#007bff">

    <!-- Global CSS -->
    <link rel="stylesheet" href="static/style.css">

    <!-- Page CSS --> 
  <link rel="stylesheet" href="static/style.css">
  <link rel="stylesheet" href="../pages/dashboard.css">
  <link rel="stylesheet" href="../pages/home.css">
  <link rel="stylesheet" href="../pages/metaverse.css">
  <link rel="stylesheet" href="../pages/media.css">
  <link rel="stylesheet" href="../pages/manager.css">
  <link rel="stylesheet" href="../pages/bitcoin.css">
  <link rel="stylesheet" href="../pages/gps.css">
  <link rel="stylesheet" href="../pages/matrix.css">
  <link rel="stylesheet" href="pages/social.css">
  <link rel="stylesheet" href="pages/games.css">
  <link rel="stylesheet" href="pages/settings.css">
</head>

<body>
    <!-- Header -->
    <header>
        <h1>منصة ميكس</h1>
        <p></p>
    </header>

    <!-- Navigation -->
    <nav>
        
  <a href="#home">🏠 الرئيسية</a>
  <a href="#dashboard">📊 Dashboard</a>
  <a href="#media">🎬 Media</a>
  <a href="#metaverse">🌐 Metaverse</a>
  <a href="#matrix">🧠 Matrix</a>
  <a href="#gps">📡 GPS</a>
  <a href="#wallet">💰 Wallet</a>
  <a href="#bitcoin">₿ Bitcoin</a>
  <a href="#manager">🧑‍💼 Manager</a>
  <a href="#social"> 📝 social</a>
  <a href="#games"> 🎮 games</a>
  <a href="#settings"> 🔧 settings</a>
    </nav>

    <!-- Main App Container -->
    <main>
        <!-- App Loader -->
        <div id="app"></div>

        <!-- Individual Sections (Backup Display) -->
        <section id="social">
            <h2></h2>
            <div id="social-feed"></div>
        </section>

        <section id="store">
            <h2></h2>
            <div id="store-items"></div>
        </section>

        <section id="wallet">
            <h2></h2>
            <div id="wallet-info"></div>
        </section>

        <section id="games">
            <h2></h2>
            <div id="games-list"></div>
        </section>

        <section id="metaverse">
            <h2></h2>
            <div id="metaverse-world"></div>
        </section>

        <section id="matrix">
            <h2></h2>
            <div id="matrix-Dream"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>© منصة ميكس 2026</p>
    </footer>

    <!-- Main JS -->
    <script type="module" src="static/main.js"></script>

    <!-- Load Page Modules -->
    <script type="module">
        import { loadBitcoin } from "./pages/bitcoin.js";
        import { loadManager } from "./pages/manager.js";
        import { loadWallet } from "./pages/wallet.js";
        import { loadMedia } from "./pages/media.js";
        import { loadHome } from "./pages/home.js";
        import { loadMetaverse } from "./pages/metaverse.js";
        import { loadDashboard } from "./pages/dashboard.js";
        import { loadSocial } from "./pages/social.js";
        import { loadGames } from "./pages/games.js";
        import { loadGPS } from "./pages/gps.js";
        import { loadMatrix } from "./pages/matrix.js";
        import { loadMatrix } from "./pages/settings.js";
      
      
        const app = document.getElementById("app");

        // Load All Modules
        loadHome(app);
        loadDashboard(app);
        loadSocial(app);
        loadGames(app);
        loadMetaverse(app);
        loadMatrix(app);
        loadWallet(app);
        loadMedia(app);
        loadManager(app);
        loadBitcoin(app);
        loadGPS(app);
    </script>

    <!-- Register Service Worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker Registered', reg))
                .catch(err => console.error('Service Worker Registration Failed', err));
            });
        }
    </script>
</body>
</html>
