<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix Platform</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Theme Color -->
    <meta name="theme-color" content="#007bff">

    <!-- Global CSS -->
    <link rel="stylesheet" href="static/style.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="pages/dashboard.css">
    <link rel="stylesheet" href="pages/home.css">
    <link rel="stylesheet" href="pages/metaverse.css">
    <link rel="stylesheet" href="pages/media.css">
    <link rel="stylesheet" href="pages/manager.css">
    <link rel="stylesheet" href="pages/bitcoin.css">
    <link rel="stylesheet" href="pages/gps.css">
    <link rel="stylesheet" href="pages/matrix.css">
    <link rel="stylesheet" href="pages/social.css">
    <link rel="stylesheet" href="pages/games.css">
    <link rel="stylesheet" href="pages/settings.css">
</head>

<body>
    <!-- Header -->
    <header>
        <h1>Mix Platform</h1>
        <p>وقت التشغيل الرقمي الموحد</p>
    </header>

    <!-- Navigation -->
    <nav id="main-nav">
        <!-- سيتم تعبئته بواسطة JS ديناميكي -->
    </nav>

    <!-- Main App Container -->
    <main>
        <div id="app">جارٍ تحميل التطبيق...</div>

        <!-- Individual Sections (Backup) -->
        <section id="social">
            <h2>Social</h2>
            <div id="social-feed"></div>
        </section>

        <section id="store">
            <h2>Store</h2>
            <div id="store-items"></div>
        </section>

        <section id="wallet">
            <h2>Wallet</h2>
            <div id="wallet-info"></div>
        </section>

        <section id="games">
            <h2>Games</h2>
            <div id="games-list"></div>
        </section>

        <section id="metaverse">
            <h2>Metaverse</h2>
            <div id="metaverse-world"></div>
        </section>

        <section id="matrix">
            <h2>Matrix Chat</h2>
            <div id="matrix-chat"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>Mix Platform 2026 ©</p>
    </footer>

    <!-- Main JS -->
    <script type="module" src="static/main.js"></script>

    <!-- Load Page Modules -->
    <script type="module">
        import { loadBitcoin } from "./pages/bitcoin.js";
        import { loadManager } from "./pages/manager.js";
        import { loadWallet } from "./pages/wallet.js";
        import { loadMedia } from "./pages/media.js";
        import { loadHome } from "./pages/home.js";
        import { loadMetaverse } from "./pages/metaverse.js";
        import { loadDashboard } from "./pages/dashboard.js";
        import { loadSocial } from "./pages/social.js";
        import { loadGames } from "./pages/games.js";
        import { loadGPS } from "./pages/gps.js";
        import { loadMatrix } from "./pages/matrix.js";
        import { loadSettings } from "./pages/settings.js";

        const app = document.getElementById("app");
        const nav = document.getElementById("main-nav");

        // Menu Items ديناميكي
        const menuItems = [
            { name: "🏠 Home", action: () => loadHome(app) },
            { name: "📊 Dashboard", action: () => loadDashboard(app) },
            { name: "🎬 Media", action: () => loadMedia(app) },
            { name: "🌐 Metaverse", action: () => loadMetaverse(app) },
            { name: "🧠 Matrix", action: () => loadMatrix(app) },
            { name: "📡 GPS", action: () => loadGPS(app) },
            { name: "💰 Wallet", action: () => loadWallet(app) },
            { name: "₿ Bitcoin", action: () => loadBitcoin(app) },
            { name: "🧑‍💼 Manager", action: () => loadManager(app) },
            { name: "📝 Social", action: () => loadSocial(app) },
            { name: "🎮 Games", action: () => loadGames(app) },
            { name: "🔧 Settings", action: () => loadSettings(app) }
        ];

        // Generate Navigation
        nav.innerHTML = menuItems.map(item => `<a href="#">${item.name}</a>`).join(" | ");

        // Add click events
        const links = nav.querySelectorAll("a");
        links.forEach((link, idx) => {
            link.addEventListener("click", (e) => {
                e.preventDefault();
                menuItems[idx].action();
            });
        });

        // Load Home by default
        loadHome(app);
    </script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker Registered', reg))
                .catch(err => console.error('Service Worker Registration Failed', err));
            });
        }
    </script>
</body>
        </html>
